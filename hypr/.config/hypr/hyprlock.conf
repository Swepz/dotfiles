# Adapted from end-4/dots-hyprland's centered hyprlock layout.

$cache_folder = $HOME/.cache/hyprland-wallpapers

source = colors.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

background {
    monitor =
    path = $cache_folder/blurred_wallpaper.png
    color = $background
}

label {
    monitor =
    text = $TIME
    color = $on_surface
    font_size = 82
    font_family = Fira Sans Semibold
    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $on_surface_variant
    font_size = 20
    font_family = Fira Sans
    position = 0, 152
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $primary
    font_size = 21
    font_family = Fira Sans Semibold
    position = 0, 54
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 310, 56
    outline_thickness = 2
    dots_size = 0.16
    dots_spacing = 0.28
    dots_center = true
    dots_rounding = -1
    outer_color = $outline
    inner_color = rgba(00000055)
    font_color = $on_surface
    font_family = Fira Sans
    fade_on_empty = false
    placeholder_text = Password
    hide_input = false
    rounding = 18
    check_color = $primary
    fail_color = $error
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $tertiary
    numlock_color = -1
    bothlock_color = $tertiary
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT
    color = $on_surface_variant
    font_size = 14
    font_family = Fira Sans
    position = -32, 28
    halign = right
    valign = bottom
}

label {
    monitor =
    text = cmd[update:60000] uptime -p
    color = $on_surface_variant
    font_size = 14
    font_family = Fira Sans
    position = 32, 28
    halign = left
    valign = bottom
}
