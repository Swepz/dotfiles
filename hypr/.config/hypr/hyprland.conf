# -----------------------------------------------------
# Hyprland configuration
# Flattened from previous conf/ split on 2026-04-08
# -----------------------------------------------------

# -----------------------------------------------------
# Monitors
# -----------------------------------------------------
# Monitor configuration is managed by HyprDynamicMonitors based on lid,
# power, and connected-monitor state. Profiles live in:
#   ~/.config/hyprdynamicmonitors/config.toml
#   ~/.config/hyprdynamicmonitors/hyprconfigs/*.conf
# HDM writes the active profile as a symlink to ~/.config/hypr/monitors.conf
# (regenerated on lid/monitor/power events and on Hyprland config reload).
source = /home/swepz/.config/hypr/monitors.conf

# -----------------------------------------------------
# Cursor
# -----------------------------------------------------
exec-once = hyprctl setcursor breeze_cursors 24

# -----------------------------------------------------
# Environment (NVIDIA)
# -----------------------------------------------------
# -----------------------------------------------------
# Environment Variables
# name: "Nvidia"
# -----------------------------------------------------


# NVIDIA https://wiki.hyprland.org/Nvidia/
env = GBM_BACKEND,nvidia-drm
env = LIBVA_DRIVER_NAME,nvidia
env = SDL_VIDEODRIVER,wayland
# env = WLR_DRM_NO_ATOMIC,1
# env = __GL_VRR_ALLOWED,1
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __VK_LAYER_NV_optimus,NVIDIA_only

# Legacy cursor env (now handled by cursor section below)
env = WLR_NO_HARDWARE_CURSORS,1

# nvidia firefox (for hardware acceleration on FF)?
# check this post https://github.com/elFarto/nvidia-vaapi-driver#configuration
env = MOZ_DISABLE_RDD_SANDBOX,1
env = EGL_PLATFORM,wayland

# Fix green first-page rendering in GTK3 apps (zathura) with NVIDIA
env = GDK_DEBUG,nogl

cursor {
    no_hardware_cursors = true
}

# -----------------------------------------------------
# Keyboard / Input
# -----------------------------------------------------
# -----------------------------------------------------
# Keyboard Layout
# https://wiki.hyprland.org/Coniguring/Variables/#input
# -----------------------------------------------------

input {
    kb_layout = se, us
    kb_variant = 
    kb_model =
    kb_options =
    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus=false
    touchpad {
        natural_scroll = false
        scroll_factor = 1.0  # Touchpad scroll factor
        disable_while_typing = false
    }
    sensitivity = 0 # Pointer speed: -1.0 - 1.0, 0 means no modification.
}

# -----------------------------------------------------
# Colors (matugen-generated, shared with hyprlock)
# -----------------------------------------------------
source = ~/.config/hypr/colors.conf
$color8 = $primary
$color11 = $on_surface

#    ___       __           __           __
#   / _ |__ __/ /____  ___ / /____ _____/ /_
#  / __ / // / __/ _ \(_-</ __/ _ `/ __/ __/
# /_/ |_\_,_/\__/\___/___/\__/\_,_/_/  \__/
#

# Start Polkit
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Start GNOME Keyring Daemon for password storage
exec-once = gnome-keyring-daemon --start --components=secrets,ssh

# Load Wallpaper
exec-once = ~/.config/hypr/scripts/wallpaper-restore.sh

# Load Notification Daemon
exec-once = swaync

# Start Ashell
exec-once = ~/.config/ashell/launch.sh

# HyprDynamicMonitors daemon (monitor/lid/power aware profile switching).
# Logs to ~/.cache/hyprdynamicmonitors.log so profile-switch misfires (e.g. the
# path-identity short-circuit seen with lid_closed_solo) leave a trail. exec-once
# inherits Hyprland's stdio otherwise, which is routed to /dev/null under a
# graphical login.
exec-once = sh -c 'exec hyprdynamicmonitors run --enable-lid-events >>"$HOME/.cache/hyprdynamicmonitors.log" 2>&1'

# Load GTK settings
exec-once = ~/.config/hypr/scripts/gtk.sh

# Using hypridle to start hyprlock
exec-once = hypridle

# Load cliphist history
exec-once = wl-paste --watch cliphist store

# Mullvad VPN tray/GUI (daemon auto-connects via systemd + `mullvad auto-connect`)
exec-once = mullvad-vpn

# Start autostart cleanup
exec-once = ~/.config/hypr/scripts/cleanup.sh

# Applications
exec-once = zen-browser
exec-once = zeditor
exec-once = rustdesk
exec-once = vesktop

# -----------------------------------------------------
# Window general
# -----------------------------------------------------
# -----------------------------------------------------
# General window layout and colors
# name: "Default"
# -----------------------------------------------------

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = $color11
    col.inactive_border = $color8
    layout = master
    resize_on_border = true
}

# -----------------------------------------------------
# Decoration
# -----------------------------------------------------
# -----------------------------------------------------
# General window decoration
# name: "Rounding All Blur No Shadows"
# -----------------------------------------------------

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

# -----------------------------------------------------
# Layout
# -----------------------------------------------------
# -----------------------------------------------------
# Layouts
# -----------------------------------------------------

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = slave
    mfact = 0.6
}

gesture = 3, horizontal, workspace

binds {
  workspace_back_and_forth = false
  allow_workspace_cycles = true
  pass_mouse_when_bound = false
}

# -----------------------------------------------------
# Workspaces
# -----------------------------------------------------
# -----------------------------------------------------
# General workspace rules
# name: "Default"
# -----------------------------------------------------

# Workspace-to-monitor pinning lives in HDM profiles
# under ~/.config/hyprdynamicmonitors/hyprconfigs/*.conf

# Example rules (from https://wiki.hyprland.org/Configuring/Workspace-Rules/)
# workspace = 3, rounding:false, decorate:false
# workspace = name:coding, rounding:false, decorate:false, gapsin:0, gapsout:0, border:false, decorate:false, monitor:DP-1
# workspace = 8,bordersize:8
# workspace = name:Hello, monitor:DP-1, default:true
# workspace = name:gaming, monitor:desc:Chimei Innolux Corporation 0x150C, default:true
# workspace = 5, on-created-empty:[float] firefox
# workspace = special:scratchpad, on-created-empty:foot

# -----------------------------------------------------
# Misc settings
# -----------------------------------------------------

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    initial_workspace_tracking = 0
}

# -----------------------------------------------------
# Key bindings
# name: "Default"
# -----------------------------------------------------

# SUPER KEY
$mainMod = SUPER
$HYPRSCRIPTS = ~/.config/hypr/scripts

# Applications
bind = $mainMod, RETURN, exec, kitty    # Open the terminal
bind = $mainMod, W, exec, zen-browser          # Open the browser
bind = $mainMod, E, exec, nautilus    # Open the filemanager
bind = $mainMod CTRL, E, exec, rofimoji # Open the emoji picker
bind = $mainMod CTRL, C, exec, qalculate-gtk  # Open the calculator

# Display
bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") # Increase display zoom
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") # Decrease display zoom
bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1 # Reset display zoom

# Windows
bind = $mainMod, Q, killactive                                                              # Kill active window
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Quit active window and all open instances
bind = $mainMod, F, fullscreen, 0                                                           # Set active window to fullscreen
bind = $mainMod, M, fullscreen, 1                                                           # Maximize Window
bind = $mainMod, T, togglefloating                                                          # Toggle active windows into floating mode
bind = $mainMod SHIFT, T, workspaceopt, allfloat                                            # Toggle all windows into floating mode
bind = $mainMod, J, togglesplit                                                             # Toggle split
bind = $mainMod, left, movefocus, l                                                         # Move focus left
bind = $mainMod, right, movefocus, r                                                        # Move focus right
bind = $mainMod, up, movefocus, u                                                           # Move focus up
bind = $mainMod, down, movefocus, d                                                         # Move focus down
bindm = $mainMod, mouse:272, movewindow                                                     # Move window with the mouse
bindm = $mainMod, mouse:273, resizewindow                                                   # Resize window with the mouse
bind = $mainMod SHIFT, right, resizeactive, 100 0                                           # Increase window width with keyboard
bind = $mainMod SHIFT, left, resizeactive, -100 0                                           # Reduce window width with keyboard
bind = $mainMod SHIFT, down, resizeactive, 0 100                                            # Increase window height with keyboard
bind = $mainMod SHIFT, up, resizeactive, 0 -100                                             # Reduce window height with keyboard
bind = $mainMod, G, togglegroup                                                             # Toggle window group
bind = $mainMod, K, swapsplit                                                               # Swapsplit
bind = $mainMod ALT, left, swapwindow, l                                                    # Swap tiled window left
bind = $mainMod ALT, right, swapwindow, r                                                   # Swap tiled window right
bind = $mainMod ALT, up, swapwindow, u                                                      # Swap tiled window up
bind = $mainMod ALT, down, swapwindow, d                                                    # Swap tiled window down
binde = ALT,Tab,cyclenext                                                                   # Cycle between windows
binde = ALT,Tab,bringactivetotop                                                            # Bring active window to the top
bind = $mainMod, SPACE, exec, hyprctl switchxkblayout all next                              # Cycle keyboard layout (se/us)

# Actions
bind = $mainMod CTRL, R, exec, hyprctl reload                                             # Reload Hyprland configuration
bind = $mainMod SHIFT, A, exec, $HYPRSCRIPTS/toggle-animations.sh                         # Toggle animations
bind = $mainMod, PRINT, exec, $HYPRSCRIPTS/screenshot.sh                                  # Take a screenshot
bind = $mainMod ALT, F, exec, $HYPRSCRIPTS/screenshot.sh --instant                        # Take an instant full-screen screenshot
bind = $mainMod ALT, S, exec, $HYPRSCRIPTS/screenshot.sh --instant-area                   # Take an instant area screenshot
bind = $mainMod ALT, R, exec, $HYPRSCRIPTS/toggle-record.sh                               # Toggle region screen recording (wf-recorder)
bind = $mainMod CTRL, X, exec, wlogout                               # Start wlogout
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/waypaper.sh --random                                         # Change the wallpaper
bind = $mainMod CTRL, W, exec, ~/.config/hypr/scripts/waypaper.sh                                                   # Open wallpaper selector
bind = $mainMod ALT, W, exec, $HYPRSCRIPTS/wallpaper-automation.sh                        # Start random wallpaper script
bind = $mainMod, D, exec, ~/.config/hypr/scripts/launcher.sh                              # Open application launcher
bind = $mainMod CTRL, K, exec, $HYPRSCRIPTS/keybindings.sh                                # Show keybindings
bind = $mainMod SHIFT, B, exec, ~/.config/ashell/launch.sh                                # Reload Ashell
bind = $mainMod CTRL, B, exec, ~/.config/ashell/toggle.sh                                 # Toggle Ashell
bind = $mainMod SHIFT, R, exec, $HYPRSCRIPTS/loadconfig.sh                                # Reload hyprland config
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy                                            # Open clipboard manager
# bind = $mainMod CTRL, S, exec, nwg-look                              # Open GTK settings
bind = $mainMod ALT, G, exec, $HYPRSCRIPTS/gamemode.sh                                    # Toggle game mode
bind = $mainMod CTRL, L, exec, ~/.config/hypr/scripts/power.sh lock                            # Lock screen
bind = $mainMod SHIFT, H, exec, $HYPRSCRIPTS/hyprshade.sh                                 # Start wlogout
# bind = CTRL, Tab, exec, rofi -show window                                   # Open window switcher

# bind = $mainMod CTRL, right, exec, scratchpad                      # Open Sidepad
# bind = $mainMod CTRL, left, exec, scratchpad --hide                # Close Sidepad

# Workspaces
bind = $mainMod, 1, workspace, 1  # Open workspace 1
bind = $mainMod, 2, workspace, 2  # Open workspace 2
bind = $mainMod, 3, workspace, 3  # Open workspace 3
bind = $mainMod, 4, workspace, 4  # Open workspace 4
bind = $mainMod, 5, workspace, 5  # Open workspace 5
bind = $mainMod, 6, workspace, 6  # Open workspace 6
bind = $mainMod, 7, workspace, 7  # Open workspace 7
bind = $mainMod, 8, workspace, 8  # Open workspace 8
bind = $mainMod, 9, workspace, 9  # Open workspace 9
bind = $mainMod, 0, workspace, 10 # Open workspace 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1  # Move active window to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2  # Move active window to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3  # Move active window to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4  # Move active window to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5  # Move active window to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6  # Move active window to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7  # Move active window to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8  # Move active window to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9  # Move active window to workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # Move active window to workspace 10

bind = $mainMod, Tab, workspace, m+1       # Open next workspace
bind = $mainMod SHIFT, Tab, workspace, m-1 # Open previous workspace

bind = $mainMod CTRL, 1, exec, $HYPRSCRIPTS/moveTo.sh 1  # Move all windows to workspace 1
bind = $mainMod CTRL, 2, exec, $HYPRSCRIPTS/moveTo.sh 2  # Move all windows to workspace 2
bind = $mainMod CTRL, 3, exec, $HYPRSCRIPTS/moveTo.sh 3  # Move all windows to workspace 3
bind = $mainMod CTRL, 4, exec, $HYPRSCRIPTS/moveTo.sh 4  # Move all windows to workspace 4
bind = $mainMod CTRL, 5, exec, $HYPRSCRIPTS/moveTo.sh 5  # Move all windows to workspace 5
bind = $mainMod CTRL, 6, exec, $HYPRSCRIPTS/moveTo.sh 6  # Move all windows to workspace 6
bind = $mainMod CTRL, 7, exec, $HYPRSCRIPTS/moveTo.sh 7  # Move all windows to workspace 7
bind = $mainMod CTRL, 8, exec, $HYPRSCRIPTS/moveTo.sh 8  # Move all windows to workspace 8
bind = $mainMod CTRL, 9, exec, $HYPRSCRIPTS/moveTo.sh 9  # Move all windows to workspace 9
bind = $mainMod CTRL, 0, exec, $HYPRSCRIPTS/moveTo.sh 10 # Move all windows to workspace 10

bind = $mainMod, mouse_down, workspace, r+1    # Next workspace on this monitor
bind = $mainMod, mouse_up,   workspace, r-1    # Prev workspace on this monitor
bind = $mainMod CTRL, down,  workspace, emptym # Next empty workspace on this monitor

# Move the focused workspace to the other monitor
bind = $mainMod CTRL SHIFT, left,  movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, right, movecurrentworkspacetomonitor, r

# Move a single window to the other monitor (keeps the workspace where it is)
bind = $mainMod ALT SHIFT, left,  movewindow, mon:l
bind = $mainMod ALT SHIFT, right, movewindow, mon:r

# Fn keys
bind = , XF86MonBrightnessUp, exec, brightnessctl -q s +10%                                                                                                  # Increase brightness by 10%
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-                                                                                                # Reduce brightness by 10%
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+                                                                          # Increase volume by 5% (max 100% limit also added hold to raise volume)
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-                                                                               # Reduce volume by 5% (min 0% limit also added hold to lower volume)
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle                                                                                     # Toggle mute
bind = , XF86AudioPlay, exec, playerctl play-pause                                                                                                           # Audio play pause
bind = , XF86AudioPause, exec, playerctl pause                                                                                                               # Audio pause
bind = , XF86AudioNext, exec, playerctl next                                                                                                                 # Audio next
bind = , XF86AudioPrev, exec, playerctl previous                                                                                                             # Audio previous
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle                                                                                # Toggle microphone
bind = , XF86Calculator, exec, qalculate-gtk                                                                                         # Open calculator
bind = , XF86Lock, exec, hyprlock                                                                                                                            # Open screenlock
# bind = , XF86Tools, exec, nwg-look                                                                                                      # Open GTK settings

bind = , code:238, exec, brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, brightnessctl -d smc::kbd_backlight s 10-


# -----------------------------------------------------
# Window rules
# -----------------------------------------------------
# -----------------------------------------------------
# Window rules (Updated for Hyprland 0.53+)
# -----------------------------------------------------

windowrule = tile on, match:title ^(Microsoft-edge)$
windowrule = tile on, match:title ^(Brave-browser)$
windowrule = tile on, match:title ^(Chromium)$
windowrule = float on, match:title ^(pavucontrol)$
windowrule = float on, match:title ^(blueman-manager)$
windowrule = float on, match:title ^(nm-connection-editor)$
windowrule = float on, match:title ^(qalculate-gtk)$

# Browser Picture in Picture
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = move 69.5% 4%, match:title ^(Picture-in-Picture)$

# idleinhibit
windowrule = idle_inhibit fullscreen, match:class .*

# xwayland related rules
# when moving objects in resolve a large border is produced
# This rule prevents that and serves as a template for any problematic xwayland apps
windowrule {
    name = resolve-xwayland
    match:class = \bresolve\b
    match:xwayland = true

    no_blur = on
}

# This is a general rule for xwayland apps but can have other consequences
# for one user it impacted EMACs so it's disabled by default
# It's here as a reference or for quick triage of xwayland app
# windowrule = no_blur on, match:xwayland true

# -----------------------------------------------------
# Application workspace assignments
# -----------------------------------------------------
windowrule = workspace 1 silent, match:class ^(zen)$
windowrule = workspace 3 silent, match:class ^(dev\.zed\.Zed)$
windowrule = workspace 9 silent, match:class ^(rustdesk)$
windowrule = workspace 10 silent, match:class ^(vesktop)$

# -----------------------------------------------------
# Animations
# name "Default"
# -----------------------------------------------------
animations {
    enabled = false
}

# -----------------------------------------------------
# xdg-desktop-portal-hyprland environment
# -----------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# -----------------------------------------------------
# Environment and window rules
# -----------------------------------------------------
#    __  _____  _____      __  _____          ___
#   /  |/  / / / / / | /| / / / ___/__  ___  / _/
#  / /|_/ / /_/_  _/ |/ |/ / / /__/ _ \/ _ \/ _/
# /_/  /_/____//_/ |__/|__/  \___/\___/_//_/_/
#
# Updated for Hyprland 0.53+

# Pavucontrol floating
windowrule {
    name = pavucontrol
    match:class = .*org.pulseaudio.pavucontrol.*

    float = on
    size = 700 600
    center = on
    pin = on
}

# OpenAI ChatGPT floating
windowrule = float on, match:title ChatGPT.*
windowrule {
    name = chatgpt-openai
    match:title = .*chat.openai.com.*

    float = on
    size = 500 50%
    move = 20 70
}

# Waypaper
windowrule {
    name = waypaper
    match:class = .*waypaper.*

    float = on
    size = 900 700
    center = on
    pin = on
}

# SwayNC
layerrule {
    name = swaync-control
    match:namespace = swaync-control-center

    blur = on
    ignore_alpha = 0.5
}

layerrule {
    name = swaync-notification
    match:namespace = swaync-notification-window

    blur = on
    ignore_alpha = 0.5
}

# Newelle
windowrule {
    name = newelle
    match:class = io.github.qwersyk.Newelle

    float = on
    size = 1000 700
    center = on
    pin = on
}

# Blueman Manager
windowrule {
    name = blueman
    match:class = blueman-manager

    float = on
    size = 800 600
    center = on
}

# nwg-look
windowrule {
    name = nwg-look
    match:class = nwg-look

    float = on
    size = 700 600
    move = 10% 20%
    pin = on
}

# nwg-displays
windowrule {
    name = nwg-displays
    match:class = nwg-displays

    float = on
    size = 900 600
    move = 10% 20%
    pin = on
}

# System Mission Center
windowrule {
    name = missioncenter
    match:class = io.missioncenter.MissionCenter

    float = on
    pin = on
    center = on
    size = 900 600
}

# System Mission Center Preference Window
windowrule {
    name = missioncenter-prefs
    match:class = missioncenter
    match:title = ^(Preferences)$

    float = on
    pin = on
    center = on
}

# Gnome Calculator
windowrule {
    name = gnome-calc
    match:class = org.gnome.Calculator

    float = on
    size = 700 600
    center = on
}

# Hyprland Share Picker
windowrule {
    name = share-picker
    match:class = hyprland-share-picker

    float = on
    pin = on
    center = on
    size = 600 400
}

# General floating
windowrule {
    name = dotfiles-floating
    match:class = dotfiles-floating

    float = on
    size = 1000 700
    center = on
}

# Dotfiles Sidepad
windowrule {
    name = dotfiles-sidepad
    match:class = dotfiles-sidepad

    float = on
    size = 1000 700
    center = on
    pin = on
}

# Float and center file pickers
windowrule {
    name = file-picker
    match:class = xdg-desktop-portal-gtk
    match:title = ^(Open.*Files?|Save.*Files?|All Files|Save)

    float = on
    center = on
}

# XDG Desktop Portal
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# QT
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# GDK
env = GDK_SCALE,1

# Toolkit Backend
env = GDK_BACKEND,wayland,x11,*
env = CLUTTER_BACKEND,wayland

# Mozilla
env = MOZ_ENABLE_WAYLAND,1

# Set the cursor size for xcursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Ozone
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# XWayland
xwayland {
  force_zero_scaling = true
}

