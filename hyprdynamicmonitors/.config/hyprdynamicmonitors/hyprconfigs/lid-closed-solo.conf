# Profile: lid_closed_solo
# Only the laptop panel is present and the lid is closed.
# eDP stays enabled so Hyprland never sees zero monitors while
# the lid-close profile is active.
# This file MUST have a different path from laptop-only.conf so
# that HDM sees a config-file change and fires post_apply_exec.

# Samsung OLED eDP at native with scale 1.60
monitor=desc:Samsung Display Corp. ATNA60KA02-0,3200x2000@120,0x0,1.60

# Catch-all for any other unexpected monitor
monitor=,preferred,auto,1

# -----------------------------------------------------
# Workspace pinning — everything on the laptop panel.
# -----------------------------------------------------
$laptop = desc:Samsung Display Corp. ATNA60KA02-0

workspace = 1,  monitor:$laptop, default:true, persistent:true
workspace = 2,  monitor:$laptop, persistent:true
workspace = 3,  monitor:$laptop, persistent:true
workspace = 4,  monitor:$laptop, persistent:true
workspace = 5,  monitor:$laptop, persistent:true
workspace = 6,  monitor:$laptop, persistent:true
workspace = 7,  monitor:$laptop, persistent:true
workspace = 8,  monitor:$laptop, persistent:true
workspace = 9,  monitor:$laptop, persistent:true
workspace = 10, monitor:$laptop, persistent:true
