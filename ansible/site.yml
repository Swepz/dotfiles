---
- name: Provision Arch Linux workstation
  hosts: localhost
  connection: local

  pre_tasks:
    - name: Install community.general collection
      ansible.builtin.command:
        cmd: ansible-galaxy collection install community.general
      changed_when: false
      become: false

    - name: Remove retired packages
      become: true
      community.general.pacman:
        name: "{{ retired_packages }}"
        state: absent
      when: retired_packages | default([]) | length > 0
      tags: [packages, cleanup]

  roles:
    - role: base
      tags: [base, packages]
    - role: shell
      tags: [shell, packages]
    - role: editor
      tags: [editor, packages]
    - role: terminal
      tags: [terminal, packages]
    - role: desktop
      tags: [desktop, packages]
    - role: devtools
      tags: [devtools, packages]
    - role: aur
      tags: [aur, packages]
    - role: services
      tags: [services]
    - role: dotfiles
      tags: [dotfiles, stow]
